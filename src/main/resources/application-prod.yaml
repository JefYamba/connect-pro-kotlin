spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      auto-commit: false
      minimum-idle: 1
      maximum-pool-size: 5
      connection-timeout: 30000
      initialization-fail-timeout: 60000

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: false
    open-in-view: false
          
  flyway:
    enabled: true
      
  autoconfigure:
    exclude:
      - org.springframework.boot.mail.autoconfigure.MailSenderAutoConfiguration
app:
  mail:
    provider: resend

resend:
  api-key: ${RESEND_API_KEY}
  email: ${RESEND_EMAIL}

security:
  otp-token:
    expiration-time: 20

  jwt:
    secret: ${JWT_SECRET}
    expiration-time: 720
    
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

aws:
  region:
    static: ${AWS_REGION}

  credentials:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}

  s3:
    bucket-name: ${S3_BUCKET_NAME}
    bucket-url-prefix: ${S3_BUCKET_URL_PREFIX}



logging:
  level:
    root: INFO
    org.hibernate.tool.schema: DEBUG